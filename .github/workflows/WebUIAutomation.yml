name: Web UI Automation 

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-automation-test:
    runs-on: ubuntu-latest
    
    steps:
    # download repo
    - uses: actions/checkout@v4
    
    # setup java
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    # install browser
    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v2.1.2

    # Setup Gradlew
    - name: Setup Gradlew
      run: chmod +x gradlew

    # execute gradle command for running cucumber test
    - name: Execute Test 
      run: ./gradlew test

    # Archive Test Result
    - name: Archive Test Result
      uses: actions/upload-artifact@v7.0.1
      if: always()
      with:
        name: cucumber-report
        path: target/cucumber-reports.html

    # Deploy to GitHub Pages
    - name: Deploy report to Github Pages
      if: always()
      uses: peaceiris/actions-gh-pages@v4.1.0
      with:
        PERSONAL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PUBLISH_DIR: ./target
