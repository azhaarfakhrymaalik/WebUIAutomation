plugins {
    id 'java'
}

group = 'org.azhar'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    // 1. Cucumber Core & Test Engine
    implementation 'io.cucumber:cucumber-java:7.22.0'
    testImplementation 'io.cucumber:cucumber-junit:7.22.0'
    testImplementation 'io.cucumber:cucumber-junit-platform-engine:7.22.0'

    // 2. Selenium & WebDriverManager
    implementation group: 'org.seleniumhq.selenium', name: 'selenium-java', version: '4.20.0'
    implementation("io.github.bonigarcia:webdrivermanager:5.9.2")

    // 3. JUnit 5
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation 'org.junit.platform:junit-platform-suite'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}